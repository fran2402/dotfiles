exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
#exec-once = bash -c 'bash hyprctl dispatch workspace 1'
exec-once = numlockx off
exec-once = hyprpm reload
exec-once = hyprpm enable hyprtasking
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
source=~/.config/hypr/macchiato.conf

#exec = ~/.config/hypr/Scripts/terminal_startupfix.sh

exec = hyprctl setcursor Bibata-Modern-Classic 19
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
#exec = ~/.config/hypr/monitors.sh
#layerrule = noanim, hyprpicker 


scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.4
    explicit_column_widths = 0.333,0.5,0.667,1.0
    wrap_focus = true
    wrap_swapcol = true
    direction = right
}

# Set programs that you use
$terminal = kitty
$fileManager = elio
$menu = rofi -show drun
$runMenu = rofi -show run
$windowMenu = rofi -show window
$browser = zen-browser
$vscode = code
$notes = obsidian

# Some default env vars.
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
env = QT_QPA_PLATFORM=wayland
env = MOZ_ENABLE_WAYLAND=1
env = ALACRITTY_SOCKET=wayland
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    gaps_in = 7
    gaps_out = 25, 27, 27, 21
    border_size = 2
    col.active_border = rgba(959ba4aa)
    col.inactive_border = rgba(464c5477)

    layout = dwindle
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    #drop_shadow = true
    
  blur {
    enabled = true
     size = 2
     passes = 6 
     new_optimizations = on
     xray = false
     ignore_opacity = true
     brightness = 1
     contrast = 0.97
     noise = 0.0117
  }

  shadow {
    enabled = false
    range = 10
   # ignore_window = false
    color_inactive = rgba(00000000)
    color = rgba(695BC833) 
    offset = 0 0 
    render_power = 1
  }



  #drop_shadow = false
  #shadow_ignore_window = true
  #shadow_offset = 1 2
  #shadow_range = 10
  #shadow_render_power = 5
  #col.shadow = 0x66404040

 # blurls = gtk-layer-shell
 # blurls = waybar
  #blurls = lockscreen
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, fade
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
#    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  new_status = master
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
#    workspace_swipe = on
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(alacritty)$
# Example windowrule v2
# windowrulev2 = float,class:^(alacritty)$,title:^(alacritty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#windowrule = suppressevent maximize, class:.* # You'll probably like this.


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive, 
#bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, kitty -e elio
bind = $mainMod, F, exec, $browser
bind = $mainMod, N, exec, kitty
bind = $mainMod, C, exec, $vscode
bind = $mainMod, O, exec, obsidian 
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/trim_screenshot.sh
bind = $mainMod SHIFT, V, togglefloating, 
bind = $mainMod, B, fullscreen, 
bind = $mainMod, space, exec, $menu
#bind = alt, space, exec, rofi  -show find -modi find:~/.local/share/rofi/finder.sh
#bind = ALT, SPACE, exec, bash -c 'wmctrl -l | grep -q "spotnight" && wmctrl -x -a spotnight || python ~/Documents/LinuxSearch/linuxsearch.py'


#bind = $mainMod, tab, exec, $windowMenu
bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod SHIFT, J, togglesplit, # dwindle
bind = $mainMod ,W, exec, rofi-wifi-menu.sh
bind = $mainMod SHIFT, L, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, H, exec, systemctl suspend
bind = $mainMod SHIFT, R, exec, reboot
bind = $mainMod SHIFT, P, exec, shutdown now
bind = $mainMod SHIFT, D, exec, ~/.config/hypr/cycle_monitors.sh
bind = $mainMod, M, exec, kitty --class matrix -e bash -c "neo --charset=ascii"

exec-once = clipse -listen # run listener on startup

#windowrule = float,class:(clipse) # ensure you have a floating window class set if you want this behavior
#windowrule = size 522 552,class:(clipse) # set the size of the window as necessary

#windowrulev2 = plugin:invertwindow, class:.*

bind = SUPER, V, exec,  kitty --class clipse -e 'clipse'

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize Windows
bind = $mainMod SHIFT, right, resizeactive, 20 0
bind = $mainMod SHIFT, left, resizeactive, -20 0
bind = $mainMod SHIFT, up, resizeactive, 0 -20
bind = $mainMod SHIFT, down, resizeactive, 0 20

# Volume and Media Control

bind = , XF86AudioRaiseVolume, exec,pactl set-sink-volume @DEFAULT_SINK@ +10% 
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%  
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle 
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Screen brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# ScreenShot

bind = ,Print, exec, grim $(xdg-user-dir PICTURES)/Screenshots/$(date +'%s_grim.png')
bind = Shift,Print, exec, grim -g "$(slurp -d)"

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scrolling 
bind = SUPER, period, layoutmsg, move +col
bind = SUPER, comma, layoutmsg, move -col

bind = SUPER SHIFT, period, layoutmsg, swapcol r
bind = SUPER SHIFT, comma, layoutmsg, swapcol l

bind = SUPER SHIFT, F, layoutmsg, fit active
bind = SUPER SHIFT, E, layoutmsg, expel
bind = SUPER SHIFT, X, layoutmsg, consume
bind = SUPER, W, layoutmsg, colresize +conf

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

plugin:darkwindow {
  shader[transparent] {
    from = chromakey
    args = bkg=[0.08627450980392157 0.09803921568627451 0.11372549019607843] similarity=0.002 amount=2 targetOpacity=0
    }
}

windowrule = darkwindow:shade chromakey bkg=[0.08627450980392157 0.09803921568627451 0.11372549019607843] similarity=0.02 amount=0 targetOpacity=0, match:class code

windowrule = darkwindow:shade chromakey bkg=[0.12941176470588237 0.12941176470588237 0.12941176470588236] similarity=0.0002 amount=0 targetOpacity=0, match:class com.interversehq.qView 

#windowrule = darkwindow:shade chromakey bkg=[0.09803921568627451 0.10588235294117647 0.10980392156862745] similarity=0.0002 amount=0 targetOpacity=0, match:class zen

# windowrule = darkwindow:shade chromakey bkg=[0.07058823529411765 0.07058823529411765 0.07058823529411765]  similarity=0.1 amount=0 targetOpacity=0, match:title elio

windowrule = darkwindow:shade chromakey bkg=[0.08627450980392157 0.08627450980392157 0.10196078431372549] similarity=0.0002 amount=0 targetOpacity=0, match:class kitty

windowrule = darkwindow:shade chromakey bkg=[0 0 0] similarity=0.02 amount=0 targetOpacity=0, match:title (.*pdf.*)

windowrule {
  name = windowrule-1
 # darkwindow:shade = transparent
  match:class = code
}



#windowrulev2 = plugin:chromakeytitle:(.*Visual Studio Code.*)
#chromakey_background = 7,8,17

#windowrulev2 = opacity 0.65, title:(.*File Search Applet.*)
#windowrule = float, title:(.*File Search Applet.*)
#windowrule = stayfocused, title:(.*File Search Applet.*) 
#windowrule = move 20% 30%, title:(.*File Search Applet.*) 
#windowrule = size 60% 40%, title:(.*File Search Applet.*) 
#windowrulev2 = animation popin 100% title:(.*File Search Applet.*)

#windowrulev2 = opaque, title:(.*.pdf.*)
#windowrulev2 = opaque, title:(.*.djvu.*)

windowrule {
    name = btopfloat
    match:class = btopfloat

    float = on
    size = 1100 700
    stay_focused = on
    move = (monitor_w - window_w - 17) (57 - window_h)
}

windowrule {
    name = wttr
    match:class = wttr

    float = on
    size = 670 780
    stay_focused = on
    move = (monitor_w - window_w - 17) (57 - window_h)
}

windowrule {
    name = stest
    match:class = stest

    float = on
    size = 600 250
    move = (monitor_w - window_w - 17) (57 - window_h)
}

windowrule {
    name = cava
    match:class = cava

    float = on
    size = 400 200
    move = (monitor_w - window_w - 17) (monitor_h - window_h - 17)
}

windowrule {
    name = matrix
    match:class = matrix

    fullscreen = on
    opacity = 1 override
    stay_focused = on
}

windowrule {
    name = clipse
    match:class = clipse
    float = on
    size = 500 600
    stay_focused = on
    move = (monitor_w)/1.37 (monitor_h)/2.20
}


bind = Control_L&Shift_L, Escape, exec, kitty --class btopfloat -e 'btop'

#bind = SUPER, tab, hyprtasking:toggle, cursor
#bind = SUPER, tab, hyprtasking:toggle, all

plugin {
    hyprtasking {
        layout = linear

        gap_size = 10
        bg_color = 0x00222222
        border_size = 2
        exit_behavior = interacted

        gestures {
            enabled = true
            open_fingers = 3
            open_distance = 300
            open_positive = true
        }

        grid {
            rows = 3
            cols = 3
        }

        linear {
            height = 400
            scroll_speed = 1.1
            blur = 0
        }
    }
}


bind = SUPER SHIFT, SLASH, exec, kitty --class qsearch -e qs g

windowrule = float on, match:class qsearch
windowrule = center on, match:class qsearch
windowrule = size 900 220, match:class qsearch
